<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - M4nd3l</title>
    <link rel="icon" type="image/png" href="images/altro/favicon.png">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#007BFF',
                        secondary: '#6C757D'
                    },
                    borderRadius: {
                        DEFAULT: '12px'
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2ff, #f0f4f8);
            margin: 0;
        }

        .luckiest {
            font-family: 'Luckiest Guy', cursive;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .btn-primary {
            background: linear-gradient(45deg, #007BFF, #0056b3);
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.3);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">
    <div class="text-center bg-white rounded-2xl shadow-2xl p-10 max-w-md fade-in">
        <div class="text-6xl mb-4 floating">🎁</div>
        <h1 class="luckiest text-5xl text-primary mb-6">Thank You!</h1>
        <p class="text-gray-700 text-lg mb-4">
            Please reach me somewhere so I can personally thank you!
        </p>
        <p class="text-gray-700 text-lg mb-4">
            Your donation means a lot and helps me keep creating games and projects.
        </p>
        <p class="text-gray-500 mb-6">
            I appreciate your support and can’t wait to share more exciting stuff with you!
        </p>
        <a href="index.html" class="btn-primary inline-block mt-4">Back to Home</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const element = document.querySelector('.fade-in');
            setTimeout(() => {
                element.classList.add('visible');
            }, 200);
        });
    </script>
</body>

</html>
